apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-app-pedidos
  namespace: rango-qa
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  rules:
  - host: rango-api-qa.eduardotartas.dpdns.org
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: app-pedidos-api-service
            port:
              number: 80
